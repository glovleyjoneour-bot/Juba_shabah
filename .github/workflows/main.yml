name: Build Juba APK Ultimate
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          build-essential libgdbm-dev libnss3-dev libsqlite3-dev tk-dev uuid-dev lzma-dev
          pip install --upgrade pip
          pip install buildozer cython

      - name: Auto-Accept Android Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # هذه الحركة تجبر النظام يوافق على كل تراخيص جوجل قبل ما يبدأ البناء
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

      - name: Build with Buildozer
        run: |
          # تنظيف الملفات القديمة وبدء بناء نظيف ومستقر
          buildozer android clean
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Juba-App-Ready
          path: bin/*.apk
          
