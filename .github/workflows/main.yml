name: Juba Pure Build v5

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من واجهة GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Setup
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          build-essential openjdk-17-jdk-headless python3-pip libltdl-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
          
          # تحديث Pip وتثبيت Cython و Buildozer بنسخ مستقرة
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer wheel

      - name: Fresh Build
        run: |
          # تنظيف البيئة لضمان بناء "نقي" تماماً
          rm -rf .buildozer/
          
          # قبول تراخيص Android SDK أوتوماتيكياً (الحل النهائي لمشكلة التوقف)
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          yes | buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Get APK
        if: always() # لضمان رفع الملف حتى لو حدث خطأ بسيط في نهاية العملية
        uses: actions/upload-artifact@v4
        with:
          name: Juba-App-Ghost-Final
          path: bin/*.apk
          
