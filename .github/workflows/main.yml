name: Build Juba APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython
      - name: Build with Buildozer
        run: |
          buildozer android debug || buildozer android debug
        env:
          # هذه السطور تخلي النظام يوافق تلقائياً وبشكل صحيح
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Juba-App
          path: bin/*.apk
          
