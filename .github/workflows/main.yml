name: Juba Nuclear Fix
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean and Setup
        run: |
          # مسح أي مخلفات قديمة قد تسبب الفشل السريع
          rm -rf .buildozer/
          rm -f buildozer.spec.bak
          
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          build-essential openjdk-17-jdk-headless python3-pip
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer 

      - name: Force Fresh Build
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          # بناء من الصفر تماماً بدون أي ذاكرة قديمة
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Juba-Final-App
          path: bin/*.apk
          
