name: Build
on: [push]
jobs:
  juba_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: android debug
      - uses: actions/upload-artifact@v2
        with:
          name: Juba-APK
          path: bin/*.apk
          
