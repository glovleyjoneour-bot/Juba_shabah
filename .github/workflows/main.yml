name: Juba Ultimate Build
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Full Build Process
        run: |
          # 1. تنصيب كل المتطلبات دفعة واحدة
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          build-essential openjdk-17-jdk-headless python3-pip
          
          # 2. تجهيز بايثون والأدوات
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer 

          # 3. الموافقة على التراخيص وبدء البناء فوراً
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          # أمر التنظيف والبناء المباشر لمنع خطأ "الملف غير موجود"
          buildozer android clean
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Juba-App-Package
          path: bin/*.apk
          name: Juba Ultimate Build
