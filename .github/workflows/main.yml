name: Juba Ultimate Build
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install All Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          build-essential openjdk-17-jdk-headless python3-pip
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer 

      - name: Force Buildozer Config
        run: |
          # هذه الخطوة عشان نجبره يقرأ الملفات صح وما يضيع
          buildozer android clean
          yes | buildozer android debug || true

      - name: Final Build Attempt
        run: |
          # هنا التنفيذ الفعلي مع الموافقة على التراخيص
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Juba-App
          path: bin/*.apk
          
