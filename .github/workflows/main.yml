name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: android debug
      - name: Upload
        uses: actions/upload-artifact@v2
        with:
          name: Juba-Package
          path: bin/*.apk
          
